{% extends 'base.html' %}

    Admin Dashboard 📊
</h2>

<div class="row">

    <div class="col-md-3">

        <div class="card p-4 text-center">

            <h3>
                {{ total_products }}
            </h3>

            <h5>
                Products
            </h5>

        </div>

    </div>

    <div class="col-md-3">

        <div class="card p-4 text-center">

            <h3>
                {{ total_orders }}
            </h3>

            <h3>
                {{ total_users }}
            </h3>

            <h5>
                Users
            </h5>

        </div>

    </div>

    <div class="col-md-3">

        <div class="card p-4 text-center">

            <h3>
                ₹ {{ revenue }}

                Revenue
