{% extends 'base.html' %}

{% block content %}

<h2 class="mb-4">
    Login
</h2>

<form method="POST">

    {% csrf_token %}

    <input type="text"
           name="username"
           class="form-control mb-3"
           placeholder="Username">

    <input type="password"
           name="password"
           class="form-control mb-3"
           placeholder="Password">

    <button class="btn btn-dark">
        Login
    </button>

</form>

{% endblock %}
